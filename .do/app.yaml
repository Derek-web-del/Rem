# DigitalOcean App Platform spec — backup restore v13 (2026-07-12-restore-v13).
# DO: Apps → LenLearn → Settings → App Spec → ensure branch + build_command match, then Force Rebuild.
#
# UPLOADS: App Platform disk is EPHEMERAL (no persistent volumes). User uploads
# (faculty photos, curriculum PDFs, announcements) are NOT in PostgreSQL — they
# live on disk. After moving from Droplet → App, restore uploads via Admin →
# Data Backup (.lnbak) or copy from Droplet (scripts/export-droplet-uploads.sh).
# Long-term: use DigitalOcean Spaces (S3-compatible) for persistent files.
# Set DO_SPACES_ENABLED=1, DO_SPACES_BUCKET, DO_SPACES_KEY, DO_SPACES_SECRET, DO_SPACES_ENDPOINT on App Platform.
name: lenlearn
region: sgp
services:
  - name: web
    github:
      repo: Derek-web-del/Rem
      branch: main
      deploy_on_push: true
    build_command: npm install --include=dev && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
